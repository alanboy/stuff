<!DOCTYPE html>
<html>
<head>
  <title>Gmail Unread Counter</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <h1>
          Gmail Unread Messages
          <span id="unread-count" class="unread-badge">0</span>
        </h1>
      </div>
      <div class="header-right">
        <div id="status-indicator"></div>
        <button id="toggle-size" class="icon-button" title="Minimize/Maximize">▾</button>
      </div>
    </div>
    
    <div id="login-container">
      <button id="login">Sign in with Google</button>
    </div>
    
    <div id="content" class="hidden">
      <div id="senders-container">
        <h2>Top Senders</h2>
        <ul id="senders-list"></ul>
      </div>
    </div>
    
    <div class="footer">
      <div class="footer-top">
        <button id="refresh">Refresh</button>
        <button id="logout" class="hidden">Sign Out</button>
      </div>
      <div class="account-info" id="account-info">
        <span>Account: </span><span id="user-email">Not signed in</span>
      </div>
      <div class="build-info" id="build-info"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>

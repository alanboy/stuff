<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 520px;
      height: 620px;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
    }

    header {
      padding: 10px 14px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab-group {
      display: flex;
      gap: 4px;
      flex: 1;
    }

    .tab-btn {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
      color: #444;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }

    #copy-btn {
      font-size: 12px;
      padding: 4px 12px;
      background: #fff;
      color: #1a73e8;
      border: 1px solid #1a73e8;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }

    #copy-btn:hover { background: #e8f0fe; }

    #status {
      font-size: 11px;
      color: #888;
      padding: 5px 14px;
      border-bottom: 1px solid #f0f0f0;
      min-height: 22px;
    }

    /* Text panels */
    .text-panel {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.65;
      color: #222;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .loading { color: #aaa; font-style: italic; }
    .error   { color: #c00; }

    /* AI panel */
    #ai-panel {
      flex: 1;
      overflow-y: auto;
      display: none;
      flex-direction: column;
    }

    #ai-idle {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #ai-extract-btn {
      padding: 10px 24px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    #ai-extract-btn:hover { background: #1558b0; }
    #ai-extract-btn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    #ai-spinner {
      flex: 1;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      color: #888;
      font-size: 13px;
    }

    .spinner-ring {
      width: 28px;
      height: 28px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #ai-results {
      display: none;
      padding: 12px 14px;
      flex-direction: column;
      gap: 6px;
    }

    .field-row {
      display: flex;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 13px;
    }

    .field-row:last-child { border-bottom: none; }

    .field-label {
      color: #888;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      min-width: 160px;
      padding-top: 2px;
    }

    .field-value {
      color: #222;
      flex: 1;
      word-break: break-word;
    }

    .field-value.yes  { color: #2e7d32; font-weight: 500; }
    .field-value.no   { color: #999; }
    .field-value.null { color: #bbb; font-style: italic; }
    .field-value.tag-list { display: flex; flex-wrap: wrap; gap: 4px; }

    .tag {
      background: #e8f0fe;
      color: #1a73e8;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
    }

    #ai-error {
      display: none;
      padding: 16px;
      color: #c00;
      font-size: 13px;
    }

    .hs-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 0 4px;
    }

    #hs-btn {
      padding: 7px 16px;
      background: #ff7a59;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    #hs-btn:hover:not(:disabled) { background: #e8674a; }
    #hs-btn:disabled { background: #2e7d32; cursor: default; }

    .hs-ok    { font-size: 11px; color: #2e7d32; }
    .hs-error { font-size: 11px; color: #c00; }

    .rec-block {
      margin: 10px 0 6px;
      padding: 12px 14px;
      background: #f8f9fa;
      border-radius: 6px;
      border-left: 3px solid #1a73e8;
    }

    .rec-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .rec-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #888;
    }

    .rec-score {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .rec-denom {
      font-size: 13px;
      font-weight: 400;
      color: #aaa;
    }

    .rec-reason {
      font-size: 13px;
      line-height: 1.6;
      color: #333;
      margin: 0;
    }
  </style>
</head>
<body>
  <header>
    <div class="tab-group">
      <button class="tab-btn active" id="btn-smart">Smart extract</button>
      <button class="tab-btn" id="btn-full">Full page</button>
      <button class="tab-btn" id="btn-ai">AI extract</button>
    </div>
    <button id="copy-btn">Copy</button>
  </header>
  <div id="status"></div>

  <div id="text-output" class="text-panel loading">Extracting…</div>
  <div id="ai-panel">
    <div id="ai-idle">
      <button id="ai-extract-btn">Extract with Claude</button>
    </div>
    <div id="ai-spinner">
      <div class="spinner-ring"></div>
      <span>Analyzing with Claude…</span>
    </div>
    <div id="ai-results"></div>
    <div id="ai-error"></div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
